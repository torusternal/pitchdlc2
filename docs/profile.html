<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет - Pitch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <nav class="nav-pages">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="products.html" class="nav-link">Скачать</a>
      </nav>
      <div class="header-actions">
        <div class="lang-dropdown">
          <img src="https://flagcdn.com/w40/ru.png" alt="RU" class="flag-img">
        </div>
        <div class="header-buttons">
          <a href="profile.html" class="btn btn-primary-sm">Профиль</a>
        </div>
      </div>
      <button class="burger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu">
    <nav class="mobile-nav">
      <a href="index.html">Главная</a>
      <a href="products.html">Скачать</a>
      <a href="profile.html" class="active">Профиль</a>
    </nav>
  </div>

  <!-- Profile Section -->
  <section class="profile-section">
    <div class="auth-bg">
      <svg id="auth-ribbons" viewBox="0 0 1440 885" preserveAspectRatio="none">
        <defs>
          <linearGradient id="authGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff08;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffffff02;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path fill="url(#authGrad1)" d="M0,300 C400,200 800,400 1200,300 C1400,250 1440,350 1440,350 L1440,885 L0,885 Z" opacity="0.5"/>
      </svg>
    </div>
    <div class="profile-content">
      <h1 class="profile-title">Аккаунт</h1>
      
      <!-- Subscription Card -->
      <div class="glass-card profile-card">
        <h2 class="card-title">Подписка</h2>
        <div class="subscription-info">
          <div class="sub-status">
            <span class="sub-label">Статус:</span>
            <span class="sub-value free">Бесплатная</span>
          </div>
          <div class="sub-expiry">
            <span class="sub-label">Истекает:</span>
            <span class="sub-value">Никогда</span>
          </div>
        </div>
      </div>

      <!-- Account Data Card -->
      <div class="glass-card profile-card">
        <h2 class="card-title">Данные аккаунта</h2>
        <div class="account-data">
          <div class="data-row">
            <span class="data-label">UID:</span>
            <span class="data-value" id="userUid">-</span>
          </div>
          <div class="data-row">
            <span class="data-label">Роль:</span>
            <span class="data-value" id="userRole">Пользователь</span>
          </div>
          <div class="data-row">
            <span class="data-label">Логин:</span>
            <span class="data-value" id="userLogin">-</span>
          </div>
          <div class="data-row">
            <span class="data-label">Почта:</span>
            <span class="data-value" id="userEmail">-</span>
          </div>
          <div class="data-row">
            <span class="data-label">Дата регистрации:</span>
            <span class="data-value" id="userRegDate">-</span>
          </div>
          <div class="data-row">
            <span class="data-label">HWID:</span>
            <span class="data-value" id="userHwid">Не привязан</span>
          </div>
        </div>
      </div>

      <!-- Actions Card -->
      <div class="glass-card profile-card">
        <h2 class="card-title">Действия</h2>
        <div class="actions-grid">
          <button class="action-btn primary">Скачать лоадер</button>
          <button class="action-btn secondary">Активировать ключ</button>
          <button class="action-btn secondary">Сменить пароль</button>
          <button class="action-btn secondary">Сбросить HWID</button>
          <button class="action-btn secondary">Включить 2FA</button>
        </div>
      </div>

      <!-- Partner Card -->
      <div class="glass-card profile-card partner-card">
        <h2 class="card-title">Стань медиа-партнёром</h2>
        <p class="partner-desc">Получай бонусы за привлечение новых пользователей</p>
        <button class="action-btn primary">Подать заявку</button>
      </div>

      <a href="index.html" class="btn btn-ghost" onclick="logout()">Выйти</a>
    </div>
  </section>

  <script>
    // Check if logged in
    const currentUser = JSON.parse(localStorage.getItem('pitch_user'));
    if (!currentUser) {
      window.location.href = 'login.html';
    }
    
    // Display user data
    if (currentUser) {
      document.getElementById('userUid').textContent = currentUser.id || '-';
      document.getElementById('userRole').textContent = 'Пользователь';
      document.getElementById('userLogin').textContent = currentUser.username || '-';
      document.getElementById('userEmail').textContent = currentUser.email || '-';
      
      // Format registration date
      if (currentUser.createdAt) {
        const regDate = new Date(currentUser.createdAt);
        document.getElementById('userRegDate').textContent = regDate.toLocaleDateString('ru-RU');
      }
    }

    // Mobile menu toggle
    const burger = document.querySelector('.burger');
    const mobileMenu = document.querySelector('.mobile-menu');
    
    burger.addEventListener('click', () => {
      burger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    // Logout function
    function logout() {
      localStorage.removeItem('pitch_user');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
