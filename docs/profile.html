<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет - Pitch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </div>
      <nav class="nav-pages">
        <a href="index.html" class="nav-link">Главная</a>
        <a href="products.html" class="nav-link">Скачать</a>
      </nav>
      <div class="header-actions">
        <div class="lang-dropdown">
          <img src="https://flagcdn.com/w40/ru.png" alt="RU" class="flag-img">
        </div>
        <div class="header-buttons">
          <a href="profile.html" class="btn btn-primary-sm">Профиль</a>
        </div>
      </div>
      <button class="burger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu">
    <nav class="mobile-nav">
      <a href="index.html">Главная</a>
      <a href="products.html">Скачать</a>
      <a href="profile.html" class="active">Профиль</a>
    </nav>
  </div>

  <!-- Dashboard Section -->
  <section class="dash-section">
    <div class="auth-bg">
      <svg id="auth-ribbons" viewBox="0 0 1440 885" preserveAspectRatio="none">
        <defs>
          <linearGradient id="authGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff08;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ffffff02;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path fill="url(#authGrad1)" d="M0,300 C400,200 800,400 1200,300 C1400,250 1440,350 1440,350 L1440,885 L0,885 Z" opacity="0.5"/>
      </svg>
    </div>
    <div class="dash-content">
      <!-- Profile Card -->
      <div class="glass-card dash-profile">
        <div class="dash-profile-left">
          <div class="dash-avatar" id="userAvatar" onclick="changeAvatar()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); cursor: pointer; position: relative;">
            <div style="position: absolute; bottom: 0; right: 0; width: 24px; height: 24px; background: #4facfe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">📷</div>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="handleAvatarChange(this)">
          <div class="dash-user-text">
            <span class="dash-username">User123</span>
          </div>
        </div>
        <div class="dash-profile-stats">
          <a href="index.html" class="btn btn-ghost" onclick="logout()">Выйти</a>
        </div>
      </div>

      <div class="dash-columns">
        <!-- Left Column -->
        <div class="dash-col">
          <!-- Status Card -->
          <div class="glass-card dash-card">
            <span class="dash-card-label">Статус системы</span>
            <div class="dash-card-body">
              <div class="dash-row">
                <span class="dash-row-icon">🌐</span>
                <span class="dash-row-text">Серверы</span>
                <span class="dash-row-status online">Работают</span>
              </div>
              <div class="dash-row">
                <span class="dash-row-icon">🔄</span>
                <span class="dash-row-text">Обновления</span>
                <span class="dash-row-val">Актуальны</span>
              </div>
              <div class="dash-row">
                <span class="dash-row-icon">🛡️</span>
                <span class="dash-row-text">Защита</span>
                <span class="dash-row-val">Активна</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column -->
        <div class="dash-col">
          <!-- Security Card -->
          <div class="glass-card dash-card">
            <span class="dash-card-label">Безопасность</span>
            <div class="dash-card-body">
              <div class="dash-info-row">
                <span>Двухфакторная аутентификация</span>
                <span style="color: #22c55e;">Включена</span>
              </div>
              <div class="dash-info-row">
                <span>Последний вход</span>
                <span>Сегодня, 14:30</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Check if logged in
    const currentUser = JSON.parse(localStorage.getItem('pitch_user'));
    if (!currentUser) {
      window.location.href = 'login.html';
    }
    
    // Display username
    if (currentUser) {
      document.querySelector('.dash-username').textContent = currentUser.username;
    }

    // Mobile menu toggle
    const burger = document.querySelector('.burger');
    const mobileMenu = document.querySelector('.mobile-menu');
    
    burger.addEventListener('click', () => {
      burger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });

    // Avatar functions
    function changeAvatar() {
      document.getElementById('avatarInput').click();
    }

    function handleAvatarChange(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const avatarData = e.target.result;
        document.getElementById('userAvatar').style.background = `url(${avatarData}) center/cover`;
        
        // Save to localStorage
        const user = JSON.parse(localStorage.getItem('pitch_user') || '{}');
        user.avatar = avatarData;
        localStorage.setItem('pitch_user', JSON.stringify(user));
        
        // Update in users array too
        const users = JSON.parse(localStorage.getItem('pitch_users') || '[]');
        const userIndex = users.findIndex(u => u.email === user.email);
        if (userIndex >= 0) {
          users[userIndex].avatar = avatarData;
          localStorage.setItem('pitch_users', JSON.stringify(users));
        }
      };
      reader.readAsDataURL(file);
    }

    // Load avatar on page load
    function loadAvatar() {
      const user = JSON.parse(localStorage.getItem('pitch_user') || '{}');
      if (user.avatar) {
        document.getElementById('userAvatar').style.background = `url(${user.avatar}) center/cover`;
      }
    }

    // Logout function
    function logout() {
      localStorage.removeItem('pitch_user');
      window.location.href = 'index.html';
    }

    // Load avatar when page loads
    loadAvatar();
  </script>
</body>
</html>
